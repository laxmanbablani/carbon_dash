name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Install test dependencies
        run: |
          ./venv/bin/pip install pytest pytest-xdist selenium webdriver-manager "dash[testing]>=2.0.0"

      - name: Build JavaScript bundles
        run: npm run build:js

      - name: Generate Python backends
        run: ./venv/bin/dash-generate-components ./src/lib/components carbon_dash -p package-info.json --ignore '\.test\.'

      - name: Install package
        run: ./venv/bin/pip install -e .

      - name: Run tests
        run: |
          ./venv/bin/pytest tests/ -v --tb=short

      - name: Check package builds
        run: |
          ./venv/bin/pip install --upgrade build twine wheel
          ./venv/bin/python -m build --sdist --wheel
          ./venv/bin/twine check dist/*