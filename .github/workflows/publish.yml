name: Publish to PyPI / TestPyPI

on:
  push:
    tags:
      - 'v*'      # Production releases → PyPI
      - 'test-v*' # Pre-releases → TestPyPI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade build twine

      - name: Build JavaScript bundles
        run: npm run build:js

      - name: Generate Python backends
        run: ./venv/bin/dash-generate-components ./src/lib/components carbon_dash -p package-info.json --ignore '\.test\.'

      - name: Build package
        run: |
          python -m build --sdist --wheel

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI or TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ startsWith(github.ref, 'refs/tags/test-v') && 'https://test.pypi.org/legacy/' || '' }}
          skip-existing: true